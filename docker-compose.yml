version: "3.9"

services:
  db:
    image: mysql:5.7
    volumes:
      - ./volumes:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    command: mysqld --explicit_defaults_for_timestamp
    ports:
      - 3306:3306
volumes:
  db_data: {}